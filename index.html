<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>위페어 주간 출고 현황판</title>
<!-- PWA (홈 화면에 추가 시 앱처럼 실행) -->
<link rel="manifest" href="manifest.json" />
<meta name="theme-color" content="#ffffff" />
<link rel="apple-touch-icon" href="apple-touch-icon.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="출고 현황판" />
<style>
  :root{
    --teal:#2f8f87; --teal-d:#247a72;
    --blue:#1f6fdc; --black:#2b2b2b; --red:#e8473d;
    --line:#e6e8eb; --bg:#f4f6f7; --muted:#8b9298; --today:#eafaf6;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:#1c2024;
    font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Malgun Gothic","맑은 고딕",system-ui,sans-serif;
    -webkit-font-smoothing:antialiased;}
  header{background:#fff;border-bottom:1px solid var(--line);
    padding:12px 24px;display:flex;align-items:center;justify-content:space-between;}
  .logo{height:30px;width:auto;display:block}
  .shop{color:var(--teal);font-weight:700;font-size:15px}
  .wrap{padding:20px 24px 40px;max-width:1520px;margin:0 auto}
  .titlebar{display:flex;align-items:baseline;gap:14px;flex-wrap:wrap;margin-bottom:16px}
  h1{font-size:22px;margin:0;font-weight:800}
  .range{color:var(--muted);font-size:14px;font-weight:600}
  .controls{display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin-bottom:16px}
  .control{display:flex;align-items:center;gap:8px}
  label{font-size:13px;color:#555;font-weight:600}
  select{appearance:none;border:1px solid var(--line);background:#fff;border-radius:8px;
    padding:8px 30px 8px 12px;font-size:14px;font-weight:600;color:#222;cursor:pointer;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6'><path d='M0 0l5 6 5-6z' fill='%23888'/></svg>");
    background-repeat:no-repeat;background-position:right 12px center;}
  .legend{display:flex;gap:16px;align-items:center;margin-left:auto;font-size:12.5px;color:#555}
  .legend span{display:inline-flex;align-items:center;gap:6px}
  .dot{width:11px;height:11px;border-radius:3px;display:inline-block}
  .summary{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:20px}
  .kpi{background:#fff;border:1px solid var(--line);border-radius:12px;padding:14px 20px;min-width:150px}
  .kpi .n{font-size:26px;font-weight:800;line-height:1.1}
  .kpi .l{font-size:13px;color:var(--muted);font-weight:600;margin-top:3px}
  .kpi.click{cursor:pointer;transition:.12s}
  .kpi.click:hover{border-color:var(--teal);box-shadow:0 2px 8px rgba(47,143,135,.15)}
  .kpi.click .l::after{content:" ›";color:var(--teal);font-weight:800}
  /* 한 화면에 4일(컬럼) 노출, 나머지는 가로 스크롤 */
  .board{display:flex;gap:10px;overflow-x:auto;padding-bottom:10px;scroll-snap-type:x proximity}
  .col{flex:0 0 calc((100% - 30px)/4);min-width:212px;background:#eef1f2;border-radius:12px;padding:8px;min-height:120px;scroll-snap-align:start}
  .col.today{background:var(--today);outline:2px solid var(--teal);outline-offset:-2px}
  .col.unset{background:#f0eef4}
  .col.overdue{background:#fdecea}
  .col.overdue .d{color:var(--red)}
  .col.longterm{background:#fbf3e6}
  .col.longterm .d{color:#b07000}
  .colhead{display:flex;align-items:center;justify-content:space-between;padding:6px 6px 10px}
  .colhead .d{font-weight:800;font-size:14px}
  .colhead .date{font-size:11.5px;color:var(--muted);font-weight:700}
  .cnt{background:#fff;border:1px solid var(--line);border-radius:20px;font-size:11px;font-weight:700;color:#555;padding:1px 8px}
  .col.today .cnt{border-color:var(--teal);color:var(--teal-d)}
  .card{background:#fff;border:1px solid var(--line);border-left:5px solid var(--black);
    border-radius:9px;padding:8px 9px;margin-bottom:8px;cursor:pointer;transition:.12s;
    box-shadow:0 1px 2px rgba(0,0,0,.03);display:flex;gap:9px;align-items:flex-start;}
  .card:hover{box-shadow:0 3px 10px rgba(0,0,0,.12);transform:translateY(-1px)}
  .thumb{width:58px;height:50px;object-fit:cover;border-radius:7px;background:#eceef0;flex:none}
  .card.compact .thumb{width:54px;height:46px}
  .cinfo{flex:1;min-width:0}
  /* 우선작업: 별 + 연한 강조 배경 (칸 맨 위로 정렬됨) */
  .card.prio{background:#fff8e8;border-color:#ecd9a6}
  .star{color:#e6a700;font-size:13px;flex:none}
  /* 출고완료: 취소선 + 흐리게 */
  .card.done{opacity:.5}
  .card.done .plate,.card.done .model{text-decoration:line-through}
  .doneflag{font-size:10.5px;font-weight:800;color:#1d8a45;background:#e3f4e9;padding:2px 8px;border-radius:6px}
  .card.ins{border-left-color:var(--blue)}
  .card .plate{font-weight:800;font-size:14.5px}
  .card.ins .plate{color:var(--blue)}
  .card .model{font-size:12.5px;color:#444;margin-top:1px}
  .card .meta{display:flex;align-items:center;gap:6px;margin-top:7px}
  .tag{font-size:10.5px;font-weight:700;padding:1px 7px;border-radius:5px}
  .tag.ins{background:#e9f1fc;color:var(--blue)}
  .tag.gen{background:#eef0f1;color:#555}
  .adv{font-size:12px;color:var(--muted);margin-left:auto;font-weight:600}
  /* 전체 보기 — 압축 카드 (한눈에 보기) */
  .card.compact{padding:5px 9px;border-left-width:4px;margin-bottom:6px}
  /* 카드 본문: 차량번호 + 차종 한 줄 */
  .cline{display:flex;flex-wrap:nowrap;align-items:baseline;gap:7px;min-width:0}
  .cline .plate{font-weight:800;font-size:16.5px;flex:none}
  .cline .model{font-size:13.5px;color:#444;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .card.ins .cline .plate{color:var(--blue)}
  .card.compact .cline .plate{font-size:15px}
  .cbot{display:flex;align-items:center;gap:6px;margin-top:8px}
  .card.compact .cbot{margin-top:5px}
  .cbot .adv{margin-left:auto;font-size:12px;color:var(--muted);font-weight:600;flex:none}
  .stwrap{display:flex;gap:2px}
  /* 작업 상태: 빈 동그라미(색 테두리). 한 번 탭하면 다음 단계 */
  .st{display:inline-flex;align-items:center;gap:3px;font-size:12px;font-weight:800;color:#777;cursor:pointer;user-select:none;padding:2px 4px;border-radius:6px;white-space:nowrap;flex:none}
  .st:hover{background:#f0f2f3}
  .st:active{transform:scale(.92)}
  .ring{width:12px;height:12px;border-radius:50%;border:2.5px solid #b6bbc0;background:transparent;display:inline-block;flex:none}
  .r-gray{border-color:#b6bbc0}
  .r-green{border-color:#1d8a45}
  .r-amber{border-color:#e08a1e}
  /* 우측 범례 스택 */
  .legends{margin-left:auto;display:flex;flex-direction:column;gap:3px;align-items:flex-end}
  .leg-row{display:flex;align-items:center;gap:5px;font-size:11.5px;color:#666;flex-wrap:wrap;justify-content:flex-end}
  .leg-row b{font-weight:800;color:#444;width:30px;text-align:right}
  .leg-row .dot{margin-left:6px}
  .leg-row .ring{margin-left:6px;width:11px;height:11px;border-width:2px}
  .leg-row.sep{margin-top:10px}
  /* 모달 — 작업 상태 세그먼트 */
  .segwrap{display:flex;flex-direction:column;gap:8px}
  .segrow{display:flex;align-items:center;gap:6px}
  .seglab{font-size:12.5px;font-weight:800;color:#555;width:40px;flex:none}
  .seg{flex:1;border:1px solid var(--line);background:#fff;border-radius:9px;padding:11px 6px;font-size:12.5px;font-weight:700;color:#666;cursor:pointer}
  .seg.on{border-color:var(--teal);background:#eafaf6;color:var(--teal-d);box-shadow:inset 0 0 0 1px var(--teal)}
  .shipbtn{width:100%;margin-top:14px;border:none;border-radius:11px;padding:13px;font-size:14px;font-weight:800;cursor:pointer;background:var(--teal);color:#fff}
  .shipbtn:hover{background:var(--teal-d)}
  .shipbtn.on{background:#eef0f1;color:#666}
  .longbtn{width:100%;margin-top:9px;border:1px solid #e0a93f;border-radius:11px;padding:12px;font-size:13.5px;font-weight:800;cursor:pointer;background:#fff7ea;color:#b07000}
  .longbtn:hover{background:#fdefd3}
  .longbtn.on{background:#eef0f1;color:#666;border-color:var(--line)}
  .priochip{margin-left:auto;font-size:10.5px;font-weight:800;padding:2px 7px;border-radius:7px;cursor:pointer;border:1px solid #e0a93f;color:#b07000;background:#fff7ea;white-space:nowrap;user-select:none}
  .priochip.on{background:#f3a712;color:#fff;border-color:#f3a712}
  .priochip:active{transform:scale(.96)}
  .empty{color:#b6bbc0;font-size:12px;text-align:center;padding:14px 0}
  .bulkbtn{width:100%;margin:0 0 8px;border:1px dashed var(--teal);background:#f1faf8;color:var(--teal-d);border-radius:8px;padding:7px;font-size:11.5px;font-weight:800;cursor:pointer}
  .bulkbtn:hover{background:#e3f4f1}
  /* 선택 모드 */
  .selbar{display:flex;gap:5px;margin-bottom:8px;flex-wrap:wrap}
  .selbar button{border:1px solid var(--line);background:#fff;border-radius:7px;padding:6px 8px;font-size:11px;font-weight:800;cursor:pointer;flex:1;white-space:nowrap}
  .selbar .seldone{background:var(--teal);color:#fff;border-color:var(--teal)}
  .selbar .seldone:disabled{background:#cfd4d6;border-color:#cfd4d6;cursor:default}
  .selbar .selmini{color:#555;flex:0 0 auto}
  .chk{width:16px;height:16px;border:2px solid #b6bbc0;border-radius:5px;flex:none;margin-top:2px;position:relative;background:#fff}
  .chk.on{background:var(--teal);border-color:var(--teal)}
  .chk.on::after{content:"";position:absolute;left:4px;top:1px;width:4px;height:8px;border:solid #fff;border-width:0 2px 2px 0;transform:rotate(45deg)}
  .card.selectable{cursor:pointer}
  .card.selected{outline:2px solid var(--teal);outline-offset:-2px;background:#f1faf8}
  /* ── 모달 ── */
  .overlay{position:fixed;inset:0;background:rgba(20,24,28,.45);display:none;align-items:flex-start;
    justify-content:center;padding:36px 16px;z-index:50;overflow-y:auto}
  .overlay.show{display:flex}
  .modal{background:#fff;border-radius:16px;max-width:480px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.3);overflow:hidden}
  .mhead{display:flex;align-items:center;justify-content:space-between;padding:13px 16px;border-bottom:1px solid var(--line)}
  .mhead .mt{font-weight:800;font-size:15px}
  .x{border:none;background:#f0f2f3;width:30px;height:30px;border-radius:8px;font-size:15px;cursor:pointer;color:#555}
  .x:hover{background:#e3e6e8}
  .mbody{padding:16px}
  .hero{width:100%;height:168px;object-fit:cover;border-radius:11px;background:#eceef0;display:block}
  /* 차량 정보 묶음 */
  .vinfo{display:flex;align-items:center;gap:9px;flex-wrap:wrap;background:#f7f9fa;border:1px solid var(--line);
    border-radius:12px;padding:11px 13px;margin-top:13px}
  .vinfo .btag{font-size:12px;font-weight:800;padding:3px 9px;border-radius:7px}
  .vinfo .btag.ins{background:#e9f1fc;color:var(--blue)}
  .vinfo .btag.gen{background:#33373b;color:#fff}
  .vinfo .pl{font-size:19px;font-weight:800}
  .vinfo .md{font-size:13.5px;color:#555;font-weight:600}
  .vinfo .colorchip{margin-left:auto;font-size:12px;font-weight:700;color:#555;background:#fff;border:1px solid var(--line);padding:3px 9px;border-radius:7px;white-space:nowrap}
  /* 그룹 공통 */
  .grp{margin-top:14px}
  .grp-t{font-size:11.5px;font-weight:800;color:#9aa0a6;margin-bottom:7px;letter-spacing:.03em}
  .duo{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--line);border:1px solid var(--line);border-radius:11px;overflow:hidden}
  .duo .cell{background:#fff;padding:10px 13px}
  .duo .k{font-size:11.5px;color:var(--muted);font-weight:700}
  .duo .v{font-size:14.5px;font-weight:800;margin-top:3px}
  .duo .cell.out .v{color:var(--teal-d)}
  .rows{border:1px solid var(--line);border-radius:11px;overflow:hidden}
  .lrow{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:11px 13px;border-top:1px solid var(--line)}
  .lrow:first-child{border-top:none}
  .lrow .k{font-size:12.5px;color:#666;font-weight:600;white-space:nowrap}
  .lrow .v{font-size:13.5px;font-weight:700;color:#222;text-align:right;word-break:break-all}
  .telv{font-size:13.5px;font-weight:800;color:var(--teal-d);text-decoration:none;display:inline-flex;align-items:center;gap:6px}
  .telv:hover{text-decoration:underline}
  .telv svg{flex:none}
  .memo{white-space:pre-wrap;font-size:13px;line-height:1.55;font-weight:500;color:#333;
    background:#fafbfb;border:1px solid var(--line);border-radius:11px;padding:11px 13px}
  .photos{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
  .photos img{width:100%;height:80px;object-fit:cover;border-radius:9px;background:#eceef0;cursor:pointer;border:1px solid var(--line)}
  .nophoto{color:#b6bbc0;font-size:12.5px;padding:6px 0}
  .vadv{font-size:12.5px;color:#666;font-weight:600;margin-top:9px}
  .vadv b{color:#333;font-weight:800}
  .src{font-size:10px;color:var(--muted);font-weight:600;margin-left:5px}
  /* 작업사진 라이트박스 */
  .lb{position:fixed;inset:0;background:rgba(0,0,0,.85);display:none;align-items:center;justify-content:center;z-index:80;padding:18px}
  .lb.show{display:flex}
  .lbclose{position:absolute;top:14px;right:16px;background:rgba(255,255,255,.16);color:#fff;border:none;width:40px;height:40px;border-radius:10px;font-size:19px;cursor:pointer}
  .lbwrap{max-width:100%;max-height:92vh;overflow:auto;-webkit-overflow-scrolling:touch}
  .lbwrap img{display:block;max-width:100%;max-height:92vh;object-fit:contain;cursor:zoom-in;border-radius:8px;margin:auto}
  .lbwrap img.zoom{max-width:none;max-height:none;width:180%;cursor:zoom-out}
  .lbhint{position:absolute;bottom:14px;left:0;right:0;text-align:center;color:rgba(255,255,255,.7);font-size:12px}
  /* 미정 목록 */
  .ulist{display:flex;flex-direction:column;gap:8px}
  .urow{display:flex;align-items:center;gap:10px;padding:10px 12px;border:1px solid var(--line);border-radius:10px;cursor:pointer;transition:.12s}
  .urow:hover{border-color:var(--teal);background:#f7fbfa}
  .urow .bar{width:5px;height:34px;border-radius:3px;background:var(--black)}
  .urow.ins .bar{background:var(--blue)}
  .urow .pl{font-weight:800;font-size:14px}
  .urow .md{font-size:12px;color:#666}
  .urow .av{margin-left:auto;font-size:11.5px;color:var(--muted);font-weight:600}
  footer{color:var(--muted);font-size:12px;margin-top:24px;line-height:1.6}
  /* 스마트폰(담당자 필터 사용 환경): 한 칸을 넓게 → 차량번호+차종 한 줄, 판금/도장 가로 유지 */
  @media (max-width:600px){
    .wrap{padding:16px 12px 36px}
    .col{flex:0 0 88%}
    .legends{display:none}
  }
  code{background:#eceef0;padding:1px 5px;border-radius:4px;font-size:12px}

  .right-controls{display:flex;align-items:center;gap:10px}
  .logoutbtn{border:1px solid var(--line);background:#fff;border-radius:8px;padding:5px 10px;font-size:12px;font-weight:700;color:#666;cursor:pointer}
  .loginwrap{position:fixed;inset:0;background:var(--bg);display:none;align-items:center;justify-content:center;z-index:100;padding:20px}
  .logincard{background:#fff;border:1px solid var(--line);border-radius:16px;padding:28px 24px;width:100%;max-width:340px;box-shadow:0 10px 40px rgba(0,0,0,.08)}
  .logintitle{font-size:17px;font-weight:800;margin-bottom:18px;text-align:center}
  .logincard input{width:100%;border:1px solid var(--line);border-radius:10px;padding:12px;font-size:15px;margin-bottom:10px;box-sizing:border-box}
  .logincard button{width:100%;border:none;border-radius:10px;padding:13px;font-size:15px;font-weight:800;background:var(--teal);color:#fff;cursor:pointer}
  .loginerr{color:var(--red);font-size:13px;margin-top:10px;text-align:center;min-height:16px}

/* 드래그 / 정보수정 (추가) */
.card[draggable=true]{ cursor:grab; }
.card.dragging{ opacity:.45; }
.col.dragover{ outline:2px dashed #2563eb; outline-offset:-3px; background:rgba(37,99,235,.06); border-radius:10px; }
.editbtn{ width:100%; margin:8px 0 4px; padding:11px; border:1px solid #d6dae0; background:#f7f8fa; color:#333; border-radius:9px; font-size:14px; font-weight:600; cursor:pointer; }
.editbtn:hover{ background:#eef0f3; }
.edbadge,.src.edit{ display:inline-block; margin-left:6px; padding:1px 7px; font-size:11px; font-weight:600; color:#2563eb; background:#e8f0fe; border-radius:10px; vertical-align:middle; }
.edhint{ font-size:12px; color:#888; margin:6px 0 12px; line-height:1.5; }
.edform{ display:flex; flex-direction:column; gap:10px; }
.edrow{ display:flex; align-items:center; gap:10px; }
.edrow.col{ align-items:flex-start; flex-direction:column; gap:5px; }
.edrow .edk{ flex:0 0 92px; font-size:13px; color:#666; font-weight:600; }
.edrow input,.edrow select,.edrow textarea{ flex:1; width:100%; padding:9px 11px; border:1px solid #d6dae0; border-radius:8px; font-size:14px; font-family:inherit; box-sizing:border-box; background:#fff; }
.edrow textarea{ resize:vertical; }
.edbtns{ display:flex; gap:9px; margin-top:14px; }
.edsave{ flex:1; padding:12px; border:0; background:#2563eb; color:#fff; border-radius:9px; font-size:15px; font-weight:700; cursor:pointer; }
.edcancel{ flex:0 0 84px; padding:12px; border:1px solid #d6dae0; background:#fff; color:#555; border-radius:9px; font-size:14px; cursor:pointer; }
.edrevert{ width:100%; margin-top:10px; padding:10px; border:0; background:transparent; color:#c0392b; font-size:13px; cursor:pointer; text-decoration:underline; }

/* 공정 상태 아이콘 (추가) */
.sic{ vertical-align:middle; margin-left:5px; }
.leg-row .sic{ margin:0 4px 0 9px; }
.ic-gray{ color:#b6bbc0; }
.ic-amber{ color:#e08a1e; }
.ic-green{ color:#1d8a45; }
.seg .sic{ margin:0 3px 0 0; }

/* 화면 전환 + 폰 "내 작업" 화면 (추가) */
.viewbtn{ padding:7px 12px; border:1px solid #d6dae0; background:#fff; color:#333; border-radius:8px; font-size:13px; font-weight:700; cursor:pointer; white-space:nowrap; }
.mywork{ display:none; }
body.mode-mywork .controls,
body.mode-mywork .summary,
body.mode-mywork .board,
body.mode-mywork .titlebar .range{ display:none; }
body.mode-mywork .mywork{ display:block; }
body.mode-mywork .titlebar h1{ font-size:20px; }
.mysum{ display:flex; align-items:center; gap:10px; margin:2px 0 16px; font-size:13px; color:var(--muted); }
.mename{ padding:6px 13px; border:1px solid var(--line); background:#fff; border-radius:20px; font-size:14px; font-weight:700; color:#1c2024; cursor:pointer; }
.mstat{ white-space:nowrap; }
.mw-sec{ margin-bottom:16px; }
.mw-sec .mw-h{ display:flex; justify-content:space-between; align-items:center; font-weight:800; font-size:15px; margin:0 2px 8px; padding-bottom:6px; border-bottom:2px solid var(--line); }
.mw-sec.ov .mw-h{ color:var(--red); border-bottom-color:var(--red); }
.mw-sec.today .mw-h{ color:var(--teal-d); border-bottom-color:var(--teal); }
.mw-sec.done .mw-h{ color:var(--muted); }
.mw-sec .mw-c{ background:#eef1f4; color:#555; border-radius:12px; padding:1px 9px; font-size:13px; }
.mw-sec.ov .mw-c{ background:#fdecea; color:var(--red); }
.mywork .card{ width:auto; }
.mywork .thumb{ width:74px; height:60px; object-fit:cover; }
.mw-empty{ color:var(--muted); font-size:14px; padding:24px 4px; }
.nphead{ font-size:19px; font-weight:800; margin:10px 2px 6px; }
.npnote{ color:var(--muted); font-size:13px; margin:0 2px 18px; line-height:1.55; }
.npgrid{ display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.npick{ display:flex; justify-content:space-between; align-items:center; padding:16px; border:1px solid var(--line); background:#fff; border-radius:12px; font-size:16px; font-weight:700; color:#1c2024; cursor:pointer; }
.npick:active{ background:#f0f2f5; }
.npc{ background:#eef1f4; color:#555; border-radius:12px; padding:1px 9px; font-size:13px; font-weight:600; }
.npcancel{ margin-top:16px; width:100%; padding:12px; border:0; background:transparent; color:var(--muted); font-size:14px; cursor:pointer; }
@media (max-width:520px){ .shop{ display:none; } header{ padding:10px 14px; } .wrap{ padding-left:14px; padding-right:14px; } }

.npadmin{ display:flex; justify-content:center; align-items:center; gap:8px; width:100%; margin-top:12px; padding:15px; border:1px solid var(--teal); background:var(--today); color:var(--teal-d); border-radius:12px; font-size:15px; font-weight:800; cursor:pointer; }
.npadmin .npc{ background:#fff; }

/* 뷰 전환(3분할) + 위치 화면 (추가) */
.viewseg{ display:inline-flex; border:1px solid #d6dae0; border-radius:9px; overflow:hidden; }
.segv{ padding:7px 11px; border:0; background:#fff; color:#555; font-size:13px; font-weight:700; cursor:pointer; border-left:1px solid #eceef0; white-space:nowrap; }
.segv:first-child{ border-left:0; }
.segv.on{ background:var(--teal); color:#fff; }
.loc{ display:none; }
body.mode-location .controls,
body.mode-location .summary,
body.mode-location .board,
body.mode-location .mywork,
body.mode-location .titlebar .range{ display:none; }
body.mode-location .loc{ display:block; }
.loctb{ display:flex; align-items:center; gap:8px; flex-wrap:wrap; margin:2px 0 12px; }
.locbtn{ padding:9px 13px; border:1px solid #d6dae0; background:#fff; color:#333; border-radius:8px; font-size:13px; font-weight:700; cursor:pointer; }
.locbtn.on{ background:var(--teal); color:#fff; border-color:var(--teal); }
.lochint{ font-size:12px; color:var(--muted); }
.mapwrap{ position:relative; width:100%; border:1px solid var(--line); border-radius:12px; overflow:hidden; background:#eceef0; }
.mapwrap.editing{ outline:2px dashed var(--teal); outline-offset:-2px; }
.mapwrap.editing .mapimg{ cursor:crosshair; }
.mapimg{ display:block; width:100%; height:auto; }
.pin{ position:absolute; transform:translate(-50%,-50%); display:flex; flex-direction:column; align-items:center; gap:2px; cursor:pointer; z-index:1; }
.pindot{ min-width:24px; height:24px; padding:0 6px; border-radius:14px; background:var(--muted); color:#fff; font-size:13px; font-weight:800; display:flex; align-items:center; justify-content:center; border:2px solid #fff; box-shadow:0 1px 3px rgba(0,0,0,.3); }
.pin.has .pindot{ background:var(--teal); }
.pinlab{ font-size:11px; font-weight:700; color:#1c2024; background:rgba(255,255,255,.92); padding:1px 5px; border-radius:6px; white-space:nowrap; box-shadow:0 1px 2px rgba(0,0,0,.15); }
.zlist{ display:flex; flex-direction:column; gap:8px; margin-top:14px; }
.zrow{ display:flex; justify-content:space-between; align-items:center; padding:13px 15px; border:1px solid var(--line); background:#fff; border-radius:10px; font-size:15px; font-weight:700; color:#1c2024; cursor:pointer; }
.zrow.un{ color:var(--muted); }
.locchip{ font-size:11px; font-weight:700; color:var(--teal-d); background:var(--today); border:1px solid var(--teal); border-radius:10px; padding:1px 7px; }
.locrow select{ width:100%; padding:10px 11px; border:1px solid #d6dae0; border-radius:8px; font-size:15px; background:#fff; font-family:inherit; }

/* 위치 지도: 구역별 리스트 (썸네일 카드, 최대 높이 스크롤) */
.zsec{ margin-bottom:16px; }
.zsec-h{ display:flex; justify-content:space-between; align-items:center; font-weight:800; font-size:15px; margin:0 2px 8px; padding-bottom:6px; border-bottom:2px solid var(--line); }
.zcards{ max-height:560px; overflow-y:auto; padding-right:2px; }
.zcards .card{ width:auto; }
.zempty{ color:var(--muted); font-size:13px; padding:10px 2px; }

/* 지도 핀 강조(빨강) + 썸네일/대수 + 검색 (v2) */
.pin{ z-index:1; }
.pinmark{ position:relative; width:46px; height:46px; border-radius:50%; background:#c0392b; border:2px solid #fff; box-shadow:0 2px 6px rgba(0,0,0,.35); display:flex; align-items:center; justify-content:center; }
.pinmark img{ width:100%; height:100%; border-radius:50%; object-fit:cover; }
.pinmark.empty{ background:#b6bbc0; }
.pincnt{ position:absolute; top:-8px; right:-8px; min-width:23px; height:23px; padding:0 5px; border-radius:12px; background:#c0392b; color:#fff; font-size:13px; font-weight:800; display:flex; align-items:center; justify-content:center; border:2px solid #fff; }
.pinlab{ display:block; margin-top:4px; font-size:13px; font-weight:800; color:#fff; background:#c0392b; padding:2px 9px; border-radius:8px; white-space:nowrap; box-shadow:0 1px 3px rgba(0,0,0,.35); text-align:center; }
.pin.hit .pinmark{ box-shadow:0 0 0 5px rgba(232,71,61,.5), 0 2px 6px rgba(0,0,0,.35); }
.pin.hit .pinlab{ background:#e8473d; transform:scale(1.06); }
.locsearch{ flex:1; min-width:150px; padding:8px 12px; border:1px solid #d6dae0; border-radius:8px; font-size:14px; font-family:inherit; }
.locresults{ margin:0 0 12px; }
.locres-h{ font-size:13px; font-weight:800; color:var(--red); margin:2px 2px 8px; }
.locres-e{ font-size:13px; color:var(--muted); margin:2px; }
.locres-i{ display:inline-flex; align-items:center; gap:7px; margin:0 8px 8px 0; padding:8px 13px; border:1px solid var(--line); background:#fff; border-radius:20px; cursor:pointer; font-size:13px; }
.locres-i .pl{ font-weight:800; }
.locres-i .md{ color:#555; }
.locres-z{ color:var(--red); font-weight:700; margin-left:2px; }

/* 출고완료 되돌리기 (버튼/토스트/목록) */
.undobtn{ padding:7px 10px; border:1px solid #d6dae0; background:#fff; color:#555; border-radius:8px; font-size:12.5px; font-weight:700; cursor:pointer; white-space:nowrap; }
.undotoast{ position:fixed; left:50%; bottom:calc(24px + env(safe-area-inset-bottom)); transform:translateX(-50%) translateY(20px); background:rgba(28,32,36,.95); color:#fff; padding:9px 12px 9px 18px; border-radius:26px; display:flex; align-items:center; gap:14px; font-size:14px; z-index:99999; opacity:0; pointer-events:none; transition:opacity .2s, transform .2s; box-shadow:0 4px 16px rgba(0,0,0,.3); }
.undotoast.show{ opacity:1; transform:translateX(-50%) translateY(0); pointer-events:auto; }
.ut-btn{ background:#e8473d; color:#fff; border:0; border-radius:18px; padding:7px 14px; font-size:13px; font-weight:800; cursor:pointer; white-space:nowrap; }
.udnote{ font-size:12.5px; color:var(--muted); margin:2px 2px 12px; line-height:1.5; }
.udlist{ display:flex; flex-direction:column; gap:8px; }
.udrow{ display:flex; align-items:center; gap:10px; padding:8px; border:1px solid var(--line); border-radius:10px; background:#fff; }
.udthumb{ width:54px; height:44px; border-radius:7px; object-fit:cover; flex:none; }
.udinfo{ flex:1; min-width:0; }
.udtop .pl{ font-weight:800; }
.udtop .md{ color:#555; font-size:13px; }
.udmeta{ font-size:12px; color:var(--muted); margin-top:3px; }
.udbtn{ flex:none; padding:8px 14px; border:1px solid var(--red); background:#fff; color:var(--red); border-radius:8px; font-size:13px; font-weight:700; cursor:pointer; }
@media (max-width:520px){ .undobtn{ font-size:0; padding:7px 9px; } .undobtn::before{ content:"↩"; font-size:15px; } }

/* 되돌리기 목록 검색 */
.udsearch{ width:100%; padding:9px 12px; border:1px solid #d6dae0; border-radius:8px; font-size:14px; font-family:inherit; margin-bottom:10px; box-sizing:border-box; }
/* 대시보드 카드 축소 */
.kpi{ padding:11px 16px; min-width:120px; }
.kpi .n, .n{ font-size:22px; }
.kpi .l, .l{ font-size:12px; }
.summary{ gap:8px; margin-bottom:16px; }
/* 헤더 정리 (모바일에서 안 잘리게) */
@media (max-width:640px){
  header{ padding:9px 12px; }
  .logo{ height:22px; }
  .right-controls{ gap:6px; }
  .segv{ padding:6px 9px; font-size:12px; }
  .shop{ display:none; }
  .logoutbtn{ padding:6px 8px; font-size:0; white-space:nowrap; }
  .logoutbtn::before{ content:"\2718"; font-size:14px; }
  .undobtn{ font-size:0; padding:6px 8px; }
  .undobtn::before{ content:"\21A9"; font-size:15px; }
  .summary{ display:grid; grid-template-columns:repeat(3,1fr); gap:7px; }
  .kpi{ padding:9px 11px; min-width:0; }
  .kpi .n, .n{ font-size:20px; }
  .kpi .l, .l{ font-size:11px; line-height:1.25; }
}
</style>
</head>

const SUPABASE_URL = 'https://gaeepsqlxsxrcuhwaxwo.supabase.co';

/* Supabase vehicles 행 → 화면 표준 형태
   원본은 v.orig 에 보관, 화면에 보이는 값은 applyOverrides 가 (수정값 있으면 수정값) 으로 덮어씀 */
function escA(s){ return esc(s).replace(/"/g,"&quot;"); }

function applyOverrides(v){

  v.discharge    = o.discharge ? dateOnly(o.discharge) : v.orig.discharge;

}

let RAW=[]; let DATA=[]; let STATUS={}; let OVERRIDE={}; let currentAdvisor="전체"; let suppressUntil=0;
/* RAW = 표에서 불러온 전체 차량, DATA = 현황판에 실제로 담을 대상(수리중 + 최근 출고완료)만 걸러낸 것 */
let ZONES=[]; let ZMAP={}; let LOCS={};            // 구역 목록 / id→구역 / 차량id→구역id

function defaultStatus(v){ let st={body:0,paint:0,done:false,long:false,prio:false};
  if(v.discharge){ const n=dayDiff(v.discharge,BOARD_TODAY);
    if(n<=0){st.body=1;st.paint=2;} else if(n===1){st.body=1;st.paint=1;} else if(n===2){st.body=1;st.paint=0;} }
  return st; }
function getStatus(v){ const s=STATUS[v.dbId]; return s?{body:s.body,paint:s.paint,done:!!s.done,long:!!s.long,prio:!!s.prio,updated_at:s.updated_at}:defaultStatus(v); }
/* 현황판에 담을 대상인지 판정 (필터 숫자·KPI·칸 배치의 공통 기준) */
function relevant(v){
  var s=getStatus(v);
  if(v.discharge){                                   // 출고예정일이 있는 차량
    if(s.done) return dayDiff(BOARD_TODAY, v.discharge) <= RECENT_DONE_DAYS;  // 완료 → 최근/예정건만 남김
    return true;                                     // 미완료 → 요일·지연 칸에 표시
  }
  if(s.done) return false;                            // 출고일 없는 완료건은 숨김
  if(s.long) return true;                             // 장기건(작업대기)
  return recentUnset(v);                              // 미정 → 최근 입고(30일)만
}
function rebuildData(){ DATA = RAW.filter(relevant); }
function saveErr(e){ console.error(e); alert("상태 저장 실패: "+(e&&e.message?e.message:e)); }
function statusRow(dbId,s){ return { db_id:dbId, shop_id:SHOP_ID, body:s.body, paint:s.paint, done:!!s.done, is_long:!!s.long, is_prio:!!s.prio, updated_at:new Date().toISOString() }; }
function persist(v){ const s=getStatus(v); suppressUntil=Date.now()+6000;
  sbClient.from("vehicle_status").upsert(statusRow(v.dbId,s),{onConflict:"db_id"}).then(function(res){ if(res.error) saveErr(res.error); }); }

/* ── 출고완료 되돌리기 (실행취소 토스트 + 최근 완료 목록) ── */

function undoDone(dbId){ var v=RAW.find(function(x){return x.dbId===dbId;}); if(!v) return; var s=getStatus(v); s.done=false; s.updated_at=new Date().toISOString(); STATUS[dbId]=s; suppressUntil=Date.now()+6000; render(); persist(v); renderUndoList(); }
function timeAgo(iso){ if(!iso) return ""; var t=new Date(iso).getTime(); if(!t) return ""; var m=Math.floor((Date.now()-t)/60000);
  if(m<1) return "방금"; if(m<60) return m+"분 전"; var h=Math.floor(m/60); if(h<24) return h+"시간 전"; var d=Math.floor(h/24); return d+"일 전"; }
var undoQuery="";

function applyViewChrome(){ var v=getView();
  document.body.classList.toggle('mode-mywork', v==='mywork');
  document.body.classList.toggle('mode-location', v==='location');
  var seg=document.getElementById('viewSeg');
  if(seg){ var defs=[['board','현황판'],['mywork','내 작업'],['location','위치']];
    seg.innerHTML=defs.map(function(d){ return '<button class="segv'+(v===d[0]?' on':'')+'" data-v="'+d[0]+'">'+d[1]+'</button>'; }).join('');
    seg.querySelectorAll('.segv').forEach(function(b){ b.addEventListener('click', function(){ setView(b.getAttribute('data-v')); }); }); } }
function getMyName(){ try{ return localStorage.getItem('wepair_me')||null; }catch(_){ return null; } }
function setMyName(n){ try{ localStorage.setItem('wepair_me', n); }catch(_){} render(); }
function weekDays(){ var days=[]; var c=new Date(BOARD_TODAY); c.setDate(c.getDate()-1); while(days.length<6){ if(c.getDay()!==0) days.push(new Date(c)); c.setDate(c.getDate()+1); } return days; }

/* ── 렌더 (화면에 따라 분기) ── */
function render(){ applyViewChrome(); rebuildData(); var v=getView(); if(v==='mywork') renderMyWork(); else if(v==='location') renderLocation(); else renderBoard(); }
function renderBoard(){
  const WD7=["일","월","화","수","목","금","토"];
  const days=[]; { const c=new Date(BOARD_TODAY); c.setDate(c.getDate()-1); while(days.length<6){ if(c.getDay()!==0) days.push(new Date(c)); c.setDate(c.getDate()+1); } }
  const winStart=days[0]; const dayKeys=days.map(d=>ymd(d));
  document.getElementById("weekRange").textContent = fmt(days[0])+" – "+fmt(days[days.length-1]);

  const filtered=getFiltered();
  const cols=days.map(()=>[]); const unset=[];
  const overdue=[]; const longterm=[];
  filtered.forEach(function(v){
    if(!v.discharge){ if(getStatus(v).long) longterm.push(v); else if(recentUnset(v)) unset.push(v); return; }
    const idx=dayKeys.indexOf(ymd(v.discharge));
    if(idx>=0) cols[idx].push(v);
    else if(v.discharge < winStart){ if(!getStatus(v).done) overdue.push(v); }
  });

  const active=filtered.filter(v=>!getStatus(v).done);
  const todayCount=active.filter(v=>v.discharge&&ymd(v.discharge)===ymd(BOARD_TODAY)).length;
  const unsetActive=unset.filter(v=>!getStatus(v).done).length;

  document.getElementById("summary").innerHTML=
    '<div class="kpi"><div class="n">'+active.length+'</div><div class="l">총 수리중인 차량</div></div>'+
    '<div class="kpi"><div class="n">'+todayCount+'</div><div class="l">오늘 출고 예정</div></div>'+
    '<div class="kpi click" id="kpiUnset"><div class="n">'+unsetActive+'</div><div class="l">출고일 미정</div></div>';
  var ku=document.getElementById("kpiUnset"); if(ku) ku.addEventListener("click", openUnset);

  const board=document.getElementById("board"); board.innerHTML="";
  const compact=currentAdvisor==="전체";
  if(overdue.length){
    var oc=document.createElement("div"); oc.className="col overdue";
    oc.innerHTML='<div class="colhead"><span><span class="d">지연</span></span><span class="cnt">'+overdue.length+'</span></div>';
    oc.appendChild(colControl("ov", overdue, "지연 차량"));
    var selOv=selectCol==="ov";
    overdue.sort((a,b)=>(getStatus(b).prio-getStatus(a).prio)||(a.discharge-b.discharge)||a.plate.localeCompare(b.plate)).forEach(v=>oc.appendChild(cardEl(v,compact,(selOv&&!getStatus(v).done)?{selected:selected.has(idOf(v)),toggle:toggleSel}:null)));
    board.appendChild(oc);
  }
  days.forEach(function(d,i){
    const isToday=ymd(d)===ymd(BOARD_TODAY);
    const col=document.createElement("div"); col.className="col"+(isToday?" today":"");
    (function(dd){   // 카드를 이 요일 칸으로 드래그하면 출고예정일을 그 날짜로 변경
      col.addEventListener("dragover",function(e){ e.preventDefault(); e.dataTransfer.dropEffect="move"; col.classList.add("dragover"); });
      col.addEventListener("dragleave",function(e){ if(e.target===col) col.classList.remove("dragover"); });
      col.addEventListener("drop",function(e){ e.preventDefault(); col.classList.remove("dragover"); var id=e.dataTransfer.getData("text/plain"); if(id) setOvDischarge(id, ymd(dd)); });
    })(d);
    col.innerHTML='<div class="colhead"><span><span class="d">'+WD7[d.getDay()]+'</span> <span class="date">'+(d.getMonth()+1)+'/'+d.getDate()+'</span></span><span class="cnt">'+cols[i].length+'</span></div>';
    if(cols[i].length===0){ col.innerHTML+='<div class="empty">—</div>'; }
    else {
      var undone=cols[i].filter(function(v){ return !getStatus(v).done; });
      var key="d"+i; var selC=selectCol===key;
      if(undone.length) col.appendChild(colControl(key, undone, WD7[d.getDay()]+"요일("+(d.getMonth()+1)+"/"+d.getDate()+") 출고"));
      cols[i].sort(cmpCard).forEach(v=>col.appendChild(cardEl(v,compact,(selC&&!getStatus(v).done)?{selected:selected.has(idOf(v)),toggle:toggleSel}:null)));
    }
    board.appendChild(col);
  });
  const lcol=document.createElement("div"); lcol.className="col longterm";
  lcol.innerHTML='<div class="colhead"><span><span class="d">장기건(작업대기)</span></span><span class="cnt">'+longterm.length+'</span></div>';
  if(longterm.length===0){ lcol.innerHTML+='<div class="empty">—</div>'; }
  else {
    var undoneL=longterm.filter(function(v){ return !getStatus(v).done; });
    var selL=selectCol==="long";
    if(undoneL.length) lcol.appendChild(colControl("long", undoneL, "장기건"));
    longterm.sort(cmpCard).forEach(v=>lcol.appendChild(cardEl(v,compact,(selL&&!getStatus(v).done)?{selected:selected.has(idOf(v)),toggle:toggleSel}:null)));
  }
  board.appendChild(lcol);

  const ucol=document.createElement("div"); ucol.className="col unset";
  ucol.innerHTML='<div class="colhead"><span><span class="d">출고일 미정</span></span><span class="cnt">'+unset.length+'</span></div>';
  if(unset.length===0){ ucol.innerHTML+='<div class="empty">—</div>'; }
  else {
    var undoneU=unset.filter(function(v){ return !getStatus(v).done; });
    var selU=selectCol==="unset";
    if(undoneU.length) ucol.appendChild(colControl("unset", undoneU, "출고일 미정"));
    unset.sort(cmpCard).forEach(v=>ucol.appendChild(cardEl(v,compact,(selU&&!getStatus(v).done)?{selected:selected.has(idOf(v)),toggle:toggleSel}:null)));
  }
  board.appendChild(ucol);
}

/* ── 폰 "내 작업" 화면 (세로 그룹 · 내 담당만) ── */
function mwSection(host, title, list, cls){
  if(!list.length) return;
  var sec=document.createElement("div"); sec.className="mw-sec"+(cls?(" "+cls):"");
  sec.innerHTML='<div class="mw-h"><span>'+esc(title)+'</span><span class="mw-c">'+list.length+'</span></div>';
  list.forEach(function(v){ sec.appendChild(cardEl(v, false, null)); });
  host.appendChild(sec);
}
function renderNamePicker(host, cur){
  var names=KNOWN_ADVISORS.filter(function(n){ return RAW.some(function(v){ return v.advisor===n; }); });
  if(!names.length) names=KNOWN_ADVISORS.slice();
  if(names.indexOf("미분류")<0) names.push("미분류");   // 미분류 담당 선택 추가
  var cnt=function(pred){ return DATA.filter(function(v){ return pred(v) && !getStatus(v).done; }).length; };
  var btns=names.map(function(n){ var c=cnt(function(v){ return v.advisor===n; });
    return '<button class="npick" data-n="'+escA(n)+'">'+esc(n)+' <span class="npc">'+c+'</span></button>'; }).join("");
  var allc=cnt(function(){ return true; });
  host.innerHTML='<div class="nphead">누구세요?</div><div class="npnote">이 기기에 기억해 두고 내 담당 건만 보여드려요. (상단 이름을 눌러 언제든 변경)</div>'+
    '<div class="npgrid">'+btns+'</div>'+
    '<button class="npadmin" data-n="__ALL__">전체 일정 관리 · 관리자 <span class="npc">'+allc+'</span></button>'+
    (cur?'<button class="npcancel" id="npcancel">취소</button>':"");
  host.querySelectorAll(".npick,.npadmin").forEach(function(b){ b.addEventListener("click", function(){ pickName=false; setMyName(b.getAttribute("data-n")); }); });
  var cc=host.querySelector("#npcancel"); if(cc) cc.addEventListener("click", function(){ pickName=false; render(); });
}
function renderMyWork(){
  var host=document.getElementById("mywork"); if(!host) return;
  host.innerHTML="";
  var me=getMyName();
  if(!me || pickName){ renderNamePicker(host, me); return; }
  var isAll = me==="__ALL__";
  var meLabel = isAll ? "전체 · 관리자" : esc(me);
  var WD7=["일","월","화","수","목","금","토"];
  var mine = isAll ? DATA.slice() : DATA.filter(function(v){ return v.advisor===me; });
  var days=weekDays(); var dayKeys=days.map(function(d){ return ymd(d); }); var winStart=days[0];
  var cols=days.map(function(){ return []; }); var overdue=[],unset=[],longterm=[],later=[],donerecent=[];
  mine.forEach(function(v){ var s=getStatus(v);
    if(s.done){ donerecent.push(v); return; }
    if(!v.discharge){ if(s.long) longterm.push(v); else unset.push(v); return; }
    var idx=dayKeys.indexOf(ymd(v.discharge));
    if(idx>=0) cols[idx].push(v);
    else if(v.discharge<winStart) overdue.push(v);
    else later.push(v);
  });
  var act=mine.filter(function(v){ return !getStatus(v).done; }).length;
  var ti=dayKeys.indexOf(ymd(BOARD_TODAY)); var today=ti>=0?cols[ti].length:0;
  var bar=document.createElement("div"); bar.className="mysum";
  bar.innerHTML='<button class="mename" id="mename">'+meLabel+' ▾</button><span class="mstat">수리중 '+act+' · 오늘 '+today+' · 지연 '+overdue.length+'</span>';
  host.appendChild(bar);
  bar.querySelector("#mename").addEventListener("click", function(){ pickName=true; render(); });
  if(!mine.length){ var e=document.createElement("div"); e.className="mw-empty"; e.textContent=isAll?"표시할 차량이 없습니다.":"담당 중인 차량이 없습니다."; host.appendChild(e); return; }
  var byPrio=function(a,b){ return (getStatus(b).prio-getStatus(a).prio)||a.plate.localeCompare(b.plate); };
  overdue.sort(byPrio); mwSection(host,"지연",overdue,"ov");
  days.forEach(function(d,i){ var isT=ymd(d)===ymd(BOARD_TODAY);
    var lab=isT?("오늘 "+(d.getMonth()+1)+"/"+d.getDate()):(WD7[d.getDay()]+"요일 "+(d.getMonth()+1)+"/"+d.getDate());
    cols[i].sort(byPrio); mwSection(host,lab,cols[i], isT?"today":""); });
  later.sort(byPrio); mwSection(host,"이후 예정",later);
  unset.sort(byPrio); mwSection(host,"출고일 미정",unset);
  longterm.sort(byPrio); mwSection(host,"장기건(작업대기)",longterm);
  donerecent.sort(function(a,b){ return a.plate.localeCompare(b.plate); }); mwSection(host,"최근 출고완료",donerecent,"done");
}

/* ── 위치(주차 구역) ── */
function getLoc(dbId){ return LOCS[dbId]||null; }
function zoneName(id){ var z=ZMAP[id]; return z?z.name:null; }
function setLoc(dbId, zid){
  LOCS[dbId]=zid||null; suppressUntil=Date.now()+6000;
  var row={ db_id:dbId, shop_id:SHOP_ID, location_zone:(zid||null), updated_at:new Date().toISOString() };
  sbClient.from("vehicle_status").upsert(row,{onConflict:"db_id"}).then(function(res){ if(res.error) saveErr(res.error); });
  render();
}
function reloadZones(){ return loadAll("zones").then(function(zs){ ZONES=zs.filter(function(z){return z.active!==false;}); ZMAP={}; ZONES.forEach(function(z){ZMAP[z.id]=z;}); render(); }).catch(function(e){ saveErr(e); }); }
function addZone(name,x,y){ sbClient.from("zones").insert({shop_id:SHOP_ID,name:name,x:x,y:y,active:true}).then(function(r){ if(r.error){ saveErr(r.error); return; } reloadZones(); }); }
function renameZone(id,name){ sbClient.from("zones").update({name:name}).eq("id",id).then(function(r){ if(r.error) saveErr(r.error); else reloadZones(); }); }
function deleteZone(id){ sbClient.from("zones").update({active:false}).eq("id",id).then(function(r){ if(r.error) saveErr(r.error); else reloadZones(); }); }
function ensureMap(){ if(mapLoaded) return Promise.resolve(); return sbClient.from("shop_map").select("image").eq("shop_id",SHOP_ID).maybeSingle().then(function(r){ MAPIMG=(r.data&&r.data.image)||null; mapLoaded=true; }).catch(function(){ mapLoaded=true; }); }
function saveMapImage(dataUrl){ MAPIMG=dataUrl; sbClient.from("shop_map").upsert({shop_id:SHOP_ID,image:dataUrl,updated_at:new Date().toISOString()},{onConflict:"shop_id"}).then(function(r){ if(r.error) saveErr(r.error); render(); }); }
function pickMapImage(){
  var inp=document.createElement("input"); inp.type="file"; inp.accept="image/*";
  inp.onchange=function(){ var f=inp.files&&inp.files[0]; if(!f) return; var rd=new FileReader();
    rd.onload=function(){ var img=new Image(); img.onload=function(){
      var max=1600, w=img.width, h=img.height; if(w>max){ h=Math.round(h*max/w); w=max; }
      var cv=document.createElement("canvas"); cv.width=w; cv.height=h; cv.getContext("2d").drawImage(img,0,0,w,h);
      saveMapImage(cv.toDataURL("image/jpeg",0.82));
    }; img.src=rd.result; }; rd.readAsDataURL(f); };
  inp.click();
}
function zoneCount(zid){ return DATA.filter(function(v){ return (getLoc(v.dbId)||"")===(zid||""); }).length; }
function zoneMenu(z){
  var a=prompt('구역 이름 수정 (비우고 확인하면 삭제)', z.name); if(a===null) return;
  if(a.trim()===""){ if(confirm('"'+z.name+'" 구역을 삭제할까요?')) deleteZone(z.id); return; }
  if(a.trim()!==z.name) renameZone(z.id, a.trim());
}
function openZonePanel(zid){
  var name = zid ? (zoneName(zid)||"삭제된 구역") : "미지정";
  var list = DATA.filter(function(v){ return (getLoc(v.dbId)||"")===(zid||""); });
  modalBox.innerHTML='<div class="mhead"><span class="mt">'+esc(name)+' · '+list.length+'대</span><button class="x" id="mClose">✕</button></div><div class="mbody" id="zpBody"></div>';
  var body=modalBox.querySelector("#zpBody");
  if(!list.length){ body.innerHTML='<div class="nophoto">이 구역에 차량이 없습니다.</div>'; }
  else list.sort(cmpCard).forEach(function(v){ body.appendChild(cardEl(v, true, null)); });   // 썸네일+번호+차종 카드
  modalBox.querySelector("#mClose").addEventListener("click", closeModal);
  showOverlay();
}
/* 지도 아래: 구역별 차량 리스트(썸네일·번호·차종). 구역마다 최대 높이 안에서 스크롤 → 서로 겹치지 않음 */
function zoneSection(host, zid, name){
  var list=DATA.filter(function(v){ return (getLoc(v.dbId)||"")===(zid||""); });
  var sec=document.createElement("div"); sec.className="zsec"; sec.id="zsec-"+(zid||"none");
  sec.innerHTML='<div class="zsec-h"><span>'+esc(name)+'</span><span class="mw-c">'+list.length+'</span></div>';
  var box=document.createElement("div"); box.className="zcards";
  if(!list.length){ box.innerHTML='<div class="zempty">차량 없음</div>'; }
  else list.sort(cmpCard).forEach(function(v){ box.appendChild(cardEl(v, true, null)); });
  sec.appendChild(box); host.appendChild(sec);
}
var locQuery="";
function normStr(s){ return String(s==null?"":s).toLowerCase().replace(/\s+/g,""); }
function locMatches(){
  var q=normStr(locQuery); if(!q) return {cars:[], zones:{}};
  var cars=DATA.filter(function(v){ return normStr(v.plate).indexOf(q)>=0 || normStr(v.model).indexOf(q)>=0; });
  var zones={}; cars.forEach(function(v){ zones[(getLoc(v.dbId)||"")]=true; });
  return {cars:cars, zones:zones};
}
function locSearchUpdate(){
  var host=document.getElementById("location"); if(!host) return;
  var m=locMatches();
  host.querySelectorAll(".pin").forEach(function(p){ var z=p.getAttribute("data-zone"); p.classList.toggle("hit", !!(locQuery && m.zones[z])); });
  var rb=host.querySelector("#locResults"); if(!rb) return;
  if(!locQuery){ rb.innerHTML=""; return; }
  if(!m.cars.length){ rb.innerHTML='<div class="locres-e">일치하는 차량이 없습니다.</div>'; return; }
  rb.innerHTML='<div class="locres-h">'+m.cars.length+'대 찾음 · 눌러서 위치 확인</div>'+m.cars.map(function(v){ var zn=getLoc(v.dbId)?(zoneName(getLoc(v.dbId))||"구역"):"미지정";
    return '<button class="locres-i" data-id="'+escA(v.dbId)+'"><span class="pl">'+esc(v.plate)+'</span> <span class="md">'+esc(v.model)+'</span><span class="locres-z">'+esc(zn)+'</span></button>'; }).join("");
  rb.querySelectorAll(".locres-i").forEach(function(b){ b.addEventListener("click", function(){ var v=RAW.find(function(x){return x.dbId===b.getAttribute("data-id");}); if(!v) return; var zid=getLoc(v.dbId); if(zid){ var pin=host.querySelector('.pin[data-zone="'+zid+'"]'); if(pin&&pin.scrollIntoView) pin.scrollIntoView({behavior:"smooth",block:"center"}); } openDetail(v); }); });
}
function renderLocation(){
  var host=document.getElementById("location"); if(!host) return;
  if(!mapLoaded){ host.innerHTML='<div class="mw-empty">지도 불러오는 중…</div>'; ensureMap().then(function(){ if(getView()==="location") renderLocation(); }); return; }
  host.innerHTML="";
  var tb=document.createElement("div"); tb.className="loctb";
  tb.innerHTML='<button class="locbtn" id="locUpload">'+(MAPIMG?"지도 교체":"지도 이미지 업로드")+'</button>'+
    (MAPIMG?'<button class="locbtn'+(zoneEdit?" on":"")+'" id="zoneEditBtn">'+(zoneEdit?"편집 완료":"구역 편집")+'</button>':"")+
    (MAPIMG?'<input class="locsearch" id="locSearch" type="search" placeholder="차량번호·차종 검색" value="'+escA(locQuery)+'">':"")+
    '<span class="lochint">'+(zoneEdit?"지도를 눌러 구역 추가 · 핀을 눌러 이름수정/삭제":"")+'</span>';
  host.appendChild(tb);
  tb.querySelector("#locUpload").addEventListener("click", pickMapImage);
  var zeb=tb.querySelector("#zoneEditBtn"); if(zeb) zeb.addEventListener("click", function(){ zoneEdit=!zoneEdit; render(); });
  if(!MAPIMG){ var e=document.createElement("div"); e.className="mw-empty"; e.textContent="배경 지도 이미지를 업로드하면 구역 핀을 배치할 수 있어요. (공장·주변 주차장이 담긴 지도 캡처를 올려주세요)"; host.appendChild(e); return; }
  var rb=document.createElement("div"); rb.className="locresults"; rb.id="locResults"; host.appendChild(rb);
  var wrap=document.createElement("div"); wrap.className="mapwrap"+(zoneEdit?" editing":"");
  var img=document.createElement("img"); img.className="mapimg"; img.src=MAPIMG; wrap.appendChild(img);
  ZONES.forEach(function(z){ var cars=DATA.filter(function(v){ return getLoc(v.dbId)===z.id; }); var n=cars.length;
    var pin=document.createElement("div"); pin.className="pin"+(n?" has":""); pin.setAttribute("data-zone", z.id);
    pin.style.left=(z.x||50)+"%"; pin.style.top=(z.y||50)+"%";
    var thumb=n?(cars[0].photo||PLACEHOLDER):null;
    pin.innerHTML='<div class="pinmark'+(n?"":" empty")+'">'+(thumb?'<img src="'+thumb+'">':'')+'<span class="pincnt">'+n+'</span></div><div class="pinlab">'+esc(z.name)+'</div>';
    var th=pin.querySelector(".pinmark img"); if(th&&thumb) th.onerror=function(){ imgErr(th); };
    pin.addEventListener("click", function(ev){ ev.stopPropagation(); if(zoneEdit){ zoneMenu(z); return; } openZonePanel(z.id); });
    wrap.appendChild(pin);
  });
  if(zoneEdit){ img.addEventListener("click", function(ev){ var r=img.getBoundingClientRect();
    var x=Math.round((ev.clientX-r.left)/r.width*1000)/10, y=Math.round((ev.clientY-r.top)/r.height*1000)/10;
    var name=prompt("새 구역 이름 (예: 제1주차장 A열)"); if(name&&name.trim()) addZone(name.trim(), x, y); }); }
  host.appendChild(wrap);
  ZONES.forEach(function(z){ zoneSection(host, z.id, z.name); });
  zoneSection(host, "", "미지정");
  var si=tb.querySelector("#locSearch"); if(si){ si.addEventListener("input", function(){ locQuery=si.value; locSearchUpdate(); }); }
  locSearchUpdate();
}

function cardEl(v, compact, sel){
  const ins=isInsured(v.insurance);
  const st=getStatus(v);
  const el=document.createElement("div");
  el.className="card"+(ins?" ins":"")+(compact?" compact":"")+(st.done?" done":"")+(st.prio?" prio":"")+(sel?" selectable":"")+(sel&&sel.selected?" selected":"");
  const statusArea = st.done ? '<span class="doneflag">✓ 출고완료</span>' : '<span class="stwrap">'+statusChips(v)+'</span>';
  const chk = sel ? '<span class="chk'+(sel.selected?" on":"")+'"></span>' : "";
  const star = st.prio ? '<span class="star">★</span> ' : "";
  el.innerHTML=
    chk+'<img class="thumb" src="'+(v.photo||PLACEHOLDER)+'">'+
    '<div class="cinfo">'+
      '<div class="cline">'+star+'<span class="plate">'+esc(v.plate)+'</span><span class="model">'+esc(v.model)+'</span></div>'+
      '<div class="cbot">'+statusArea+((getView()==='mywork'&&getLoc(v.dbId))?'<span class="locchip">'+esc(zoneName(getLoc(v.dbId))||"구역")+'</span>':"")+'<span class="adv">'+esc(v.advisor)+'</span></div>'+
    '</div>';

  clearTimeout(backToastEl._t); backToastEl._t=setTimeout(function(){ backToastEl.style.opacity='0'; }, 1600);

function armExit(){ exitArmed=true; showBackToast(); clearTimeout(exitTimer); exitTimer=setTimeout(function(){ exitArmed=false; if(STANDALONE) pushGuard(); }, 2000); }

function buildAdvisorFilter(){

function onErr(e){ document.getElementById("board").innerHTML='<div style="padding:30px;color:#b00">'+esc(e&&e.message?e.message:e)+'</div>'; }
/* Supabase 는 한 번에 최대 1000행만 주므로, 나눠서 전부 불러온다(집계 누락 방지) */
async function loadAll(table){
  var all=[], from=0, size=1000;
  while(true){
    var r = await sbClient.from(table).select("*").range(from, from+size-1);
    if(r.error) throw r.error;
    var chunk=r.data||[]; all=all.concat(chunk);
    if(chunk.length<size) break;
    from+=size;
  }
  return all;
}
async function loadData(){
  const vs = await loadAll("vehicles");
  const ss = await loadAll("vehicle_status");
  const zs = await loadAll("zones");
  STATUS = {}; OVERRIDE = {}; LOCS = {};
  ss.forEach(function(s){ STATUS[s.db_id]={body:s.body,paint:s.paint,done:s.done,long:s.is_long,prio:s.is_prio,updated_at:s.updated_at}; OVERRIDE[s.db_id]=ovFrom(s); LOCS[s.db_id]=s.location_zone||null; });
  ZONES = zs.filter(function(z){ return z.active!==false; }); ZMAP={}; ZONES.forEach(function(z){ ZMAP[z.id]=z; });
  RAW = vs.map(mapRow);   // STATUS·OVERRIDE 먼저 구성 후 매핑
  buildAdvisorFilter(); render();
}
function applyStatusChange(p){
  if(p.eventType==="DELETE"){ var oid=p.old&&p.old.db_id; if(oid){ delete STATUS[oid]; delete OVERRIDE[oid]; delete LOCS[oid]; var ov=RAW.find(function(x){return x.dbId===oid;}); if(ov) applyOverrides(ov); } }
  else if(p.new){ var r=p.new; STATUS[r.db_id]={body:r.body,paint:r.paint,done:r.done,long:r.is_long,prio:r.is_prio,updated_at:r.updated_at}; OVERRIDE[r.db_id]=ovFrom(r); LOCS[r.db_id]=r.location_zone||null; var v=RAW.find(function(x){return x.dbId===r.db_id;}); if(v) applyOverrides(v); }
  if(!overlay.classList.contains("show") && Date.now()>=suppressUntil) render();
}
function subscribeRealtime(){
  sbClient.channel("status-rt")
    .on("postgres_changes", { event:"*", schema:"public", table:"vehicle_status" }, applyStatusChange)
    .subscribe();
}
function startVehicleRefresh(){
  setInterval(function(){
    if(overlay.classList.contains("show") || Date.now()<suppressUntil) return;
    loadAll("vehicles").then(function(vs){
      RAW = vs.map(mapRow); buildAdvisorFilter(); render();
    }).catch(function(e){ console.error(e); });
  }, 5*60*1000);   // 차량 목록은 5분마다 새로고침(동기화 10분 주기 반영)
}

async function afterLogin(){
  document.getElementById("login").style.display="none";
  document.getElementById("board").innerHTML='<div style="padding:30px;color:#888">불러오는 중…</div>';
  try{
    const u = await sbClient.auth.getUser();
    const uid = u.data.user ? u.data.user.id : null;
    if(uid){
      const su = await sbClient.from("shop_users").select("shop_id,role").eq("user_id",uid).maybeSingle();
      SHOP_ID = su.data ? su.data.shop_id : null;
    }
    if(!SHOP_ID){ onErr({message:"이 계정에 연결된 업체가 없습니다. 관리자에게 문의하세요."}); return; }
    try{ currentAdvisor = localStorage.getItem("wepair_adv") || "전체"; }catch(_){}
    await loadData();
    subscribeRealtime();
    startVehicleRefresh();
    if(STANDALONE && !boardGuard){ boardGuard=true; pushGuard(); }   // 메인 진입 시 뒤로가기 방어막 1개 확보
  }catch(err){
    console.error(err);
    onErr({message:"불러오기 오류: "+(err&&err.message?err.message:err)+" — 새로고침하거나 다시 로그인해 주세요."});
  }
}
function showLogin(){ document.getElementById("login").style.display="flex"; }
async function doLogin(){
  const idv=document.getElementById("loginId").value.trim();
  const pw=document.getElementById("loginPw").value;
  const errEl=document.getElementById("loginErr"); errEl.textContent="";
  if(!idv||!pw){ errEl.textContent="아이디와 비밀번호를 입력하세요."; return; }
  const email = idv.includes("@") ? idv : idv + LOGIN_DOMAIN;
  const res = await sbClient.auth.signInWithPassword({ email:email, password:pw });
  if(res.error){ errEl.textContent="로그인 실패: 아이디/비밀번호를 확인하세요."; return; }
  await afterLogin();
}
async function doLogout(){ await sbClient.auth.signOut(); location.reload(); }

function boot(){
  overlay=document.getElementById("overlay"); modalBox=document.getElementById("modal");
  lightbox=document.getElementById("lightbox"); lbImg=document.getElementById("lbImg");
  overlay.addEventListener("click", function(e){ if(e.target===overlay) closeModal(); });
  lbImg.addEventListener("click", function(){ lbImg.classList.toggle("zoom"); });
  document.getElementById("lbClose").addEventListener("click", closeLightbox);
  lightbox.addEventListener("click", function(e){ if(e.target===lightbox) closeLightbox(); });
  document.addEventListener("keydown", function(e){ if(e.key==="Escape"){ if(lightbox.classList.contains("show")) closeLightbox(); else closeModal(); } });
  window.addEventListener("popstate", onPopState);
  document.getElementById("loginBtn").addEventListener("click", doLogin);
  document.getElementById("loginPw").addEventListener("keydown", function(e){ if(e.key==="Enter") doLogin(); });
  var lo=document.getElementById("logoutBtn"); if(lo) lo.addEventListener("click", doLogout);
  var ud=document.getElementById("undoDoneBtn"); if(ud) ud.addEventListener("click", openUndoDone);
  var vt=document.getElementById("viewToggle"); if(vt) vt.addEventListener("click", function(){ setView(getView()==='mywork'?'board':'mywork'); });
  applyViewChrome();

  sbClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);
  sbClient.auth.getSession().then(function(res){
    if(res.data && res.data.session){ afterLogin(); }
    else { showLogin(); }
  });
}
